# Git conventions — injected into agent prompts. See docs/architecture/decisions/0016-* (supersedes 0004-*).
concern: git

branches:
  agent_namespace: "maestro/*"        # agents create only these; never the default branch
  default_branch_writes: forbidden    # enforced: always
  description: Agents work on maestro/* feature branches and open PRs from them.

merge:
  decision: human                     # the merge gate is decided by a human, always (ADR-0016)
  by_agents: only-on-recorded-approval # maestro executes the merge ONLY against a recorded,
                                       # role-authorized merge-approval event (ADR-0016); never otherwise
  enforcement:
    - merge gate decided by the human in the workspace; the decision is a recorded, attributed event
    - the github adapter refuses to merge without a valid, unconsumed, role-matched approval event
    - DoD gates green before the merge gate opens (the quality floor; ADR-0006)
  done_signal: observed-merge-event   # "Done" is the observed merge event, never an agent claim

commits:
  subject: imperative present tense, <= 72 chars, says what changed and why
  body: wrap at 72; reference the requirement / task the change satisfies

pull_requests:
  one_per: delivery task
  description_must_include:
    - link to the delivery task and its approved spec/design
    - which acceptance criteria (requirements) the change satisfies
    - automated-gate status
  reviewer_agent: may not have authored the feature it reviews   # enforced: always
