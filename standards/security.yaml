# Security standards — injected into agent prompts. Floors are never disabled.
concern: security

sast:
  tool: CodeQL or Semgrep
  policy: block on high severity        # enforced: always
  focus: [authn/authz logic, input validation, secrets handling]

dependencies:
  scan: Dependabot or Renovate + advisory DB   # enforced: always
  hallucinated_dependency_check:
    rule: verify every added package exists and is the intended one
    rationale: hallucinated/typo-squatted packages are AI code's signature failure mode
    enforced: always

secrets:
  scanning: on by default                # enforced: always
  in_code: forbidden                     # no hardcoded credentials, tokens, keys

open_source_governance:
  licenses:
    rule: allowed-license policy enforced in CI regardless of repo visibility
    prefer: permissive (MIT, Apache-2.0)
  sbom: emit per build artifact
  provenance: track origin, license, and vuln status of every dependency
  attribution: scan agent output for substantial similarity to known OSS

# Runtime / container floor — for maestro's services and the services the crew builds.
runtime:
  base_images:
    rule: pin to an explicit version tag (never `latest`); prefer slim/alpine; run as a non-root user   # enforced: always
  image_scanning:
    rule: scan every image on build (e.g. Trivy/Grype); no known-critical CVE may be deployed   # enforced: always
  container:
    rules:
      - read-only root filesystem where possible
      - drop all Linux capabilities, add back only what is needed
      - no privileged containers
      - CPU + memory limits required on every service
  network:
    rules:
      - expose only the ports a service actually uses
      - internal services are not on a public-facing network
      - external traffic enters through a single ingress/proxy
  provenance_labels:
    rule: label managed images with version + source repo (ties to sbom/provenance above)
