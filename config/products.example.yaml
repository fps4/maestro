# Product register — TEMPLATE (committed, public).
#
# Copy this to config/products.yaml (which is gitignored and PRIVATE) and put your real
# products there. The public maestro repo must never contain real product details.
#   cp config/products.example.yaml config/products.yaml
#
# Git-tracked config-as-code (ADR-0008), kept private (ADR-0010): for PR-reviewed governance
# of register changes, keep your real config/products.yaml in a PRIVATE repo or private overlay,
# not in this public engine repo. Loaded into the operational store as a read-only projection at boot.
#
# A product has 1+ repos and 1+ participants (the architect always included), one product_type
# (commercial | technical) its repos inherit, a visibility (private by default), and a deploy target.
#
# Surfaces (ADR-0011): architects approve in one shared Slack channel — an INSTANCE setting
# (ARCHITECT_SLACK_CHANNEL), not per product. A commercial product's functional reviewers approve in
# the product's own Telegram group via the product's own bot, declared per product below. Bot TOKENS
# are secrets (env/secret manager), referenced here only by logical name. Participant surface ids
# (slack_user_id / telegram_user_id) let maestro authorise and attribute a decision.
#
# Artefacts (ADR-0012): specs/designs/test reports go to the instance ArtifactStore (MinIO on ds1)
# by default, under a per-product bucket/prefix. A product may override to AWS S3 (artifact_store
# below). Object-store credentials are secrets, never here.

version: 1

products:
  # Example: a technical product (maestro building itself — dogfooding).
  - id: maestro
    name: maestro
    product_type: technical
    visibility: public            # deliberate exception to private-by-default (open-sourced)
    deploy_target:                # see ADR-0007
      default: ds1
      production: aws
    repos:
      - your-org/maestro          # maestro dogfoods itself; add more repos/products below as the portfolio grows
    # technical product: architect-only. The architect works in the maestro workspace (Google SSO via
    # component-auth — ADR-0019) and on the shared architect Slack channel; no functional reviewer.
    participants:
      # email = the participant's Google identity for the workspace (ADR-0019); slack/telegram ids are
      # for the notification surfaces. Role + product membership is the authorization (ADR-0011), not the IdP.
      - { handle: "@you", role: architect, email: you@example.com, slack_user_id: U0ARCHITECT }

  # Example: a commercial product (private — the common case).
  - id: acme-billing
    name: Acme Billing
    product_type: commercial
    visibility: private
    deploy_target:
      from_day_one: aws           # the product's tech requires AWS up front (ADR-0007 exception)
    repos:
      - acme/billing-api
      - acme/billing-web
    functional_channel:           # where this product's functional gates are posted (ADR-0011)
      surface: telegram
      bot: acme-billing-bot       # logical name; the token is a SECRET (env/secret mgr), not here
      group_chat_id: "-1001234567890"   # the product's own Telegram group
    artifact_store:               # optional override; default is the instance MinIO on ds1 (ADR-0012)
      backend: aws-s3             # AWS from day one, so this product's artefacts live on S3 too
      bucket: acme-billing-artifacts
    participants:                 # 2+ functional reviewers; any may decide in the workspace, others monitor
      - { handle: "@you",   role: architect,           email: you@example.com,   slack_user_id: U0ARCHITECT }
      - { handle: "@priya", role: functional_reviewer, email: priya@example.com,  telegram_user_id: "987654321" }
      - { handle: "@sam",   role: functional_reviewer, email: sam@example.com,    telegram_user_id: "123456789" }
