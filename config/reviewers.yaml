# Split-review routing — see docs/architecture/decisions/0003-split-review-routing-matrix.md
#
# Resolves (product_type, gate) -> reviewer role -> a human participant.
# The reviewer is always the architect, EXCEPT a commercial product's functional gate.
#
# product_type and the participant roster live on the PRODUCT; its repos inherit them.
# Defaults below apply to any product that does not declare its own.

version: 1

# Role -> handle resolution is two steps:
#   1. the matrix below resolves (product_type, gate) -> ROLE   (this file; ADR-0003)
#   2. that role -> a HANDLE resolves from the product's participants in
#      config/products.yaml FIRST (per-product roster is authoritative; ADR-0005/0008),
#      falling back to the global defaults here only when the product names no
#      participant for the resolved role.
# So these are FALLBACK defaults, not the source of truth — per-product participants win.
roles:
  architect: "@architect"            # fallback handle for the architect role
  functional_reviewer: "@reviewer"   # fallback handle for the functional-reviewer role

# Default for a product that does not set its own.
defaults:
  product_type: technical            # technical | commercial

# The matrix. gate -> { commercial, technical } -> role key.
routing:
  functional:                        # reviews the functional spec (pre-code)
    commercial: functional_reviewer
    technical: architect
  technical:                         # reviews the technical design and the PR diff
    commercial: architect
    technical: architect

# Which surface each role is reached on (ADR-0011). A gate posts to that role's GROUP, and any
# participant holding the role for the product may decide (quorum below); the rest monitor silently.
# Concrete destinations are instance data, not here: the architect Slack channel is an instance
# setting; each product's Telegram group + bot live on the product (config/products.yaml).
surfaces:
  architect: slack                   # one shared architect-team channel
  functional_reviewer: telegram      # the product's own group, via the product's per-product bot

# Gate behaviour.
gate:
  timeout_seconds: 86400             # how long a gate waits for a decision before escalating
  on_timeout: escalate               # escalate | cancel  (never auto-approve)
  quorum: 1                          # the first valid decision from a role-holder resolves the gate

# Products (their product_type, repos, participant rosters, and per-product Telegram group/bot)
# are defined in the product register: config/products.yaml (ADR-0008/0011). This file holds only
# the routing matrix, the role->surface policy, and gate behaviour; the RoutingResolver combines
# them to resolve (product, gate) -> role -> surface -> destination group.
